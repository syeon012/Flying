<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wuthering Heights - 비행술</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* 부스터 아이템 자체 발광 효과 */
        .item-glow {
            filter: drop-shadow(0 0 10px #fff200) drop-shadow(0 0 20px #ffea00);
            animation: item-pulse 1s infinite alternate;
        }

        @keyframes item-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }
        :root {
            --bg: #fdfdfd; --sky: #ebf5fb; --primary: #6c5ce7;
            --danger: #ff7675; --text: #333333; --border: #dfe6e9;
        }
        * { user-select: none; -webkit-user-drag: none; outline: none; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; touch-action: none;
        }
        .screen { 
            display: none; width: 100%; max-width: 450px; height: 100%; 
            background: linear-gradient(to top, #ebf5fb, #ffffff); 
            padding: 20px; flex-direction: column; align-items: center; position: relative; overflow: hidden;
            transition: background 0.3s;
        }
        .active { display: flex; }

        /* 부스터 발광 효과 */
        .boost-active { background: linear-gradient(to top, #6c5ce7, #a29bfe) !important; }
        .boost-glow { filter: drop-shadow(0 0 20px #fff) brightness(1.5) !important; }

        .header-container { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .life-container { font-size: 1.5rem; }
        #distance { font-size: 2rem; font-weight: 900; color: var(--primary); margin: 0; line-height: 1; }
        .unit { font-size: 0.7rem; font-weight: bold; color: #7f8c8d; }

        #player { position: absolute; bottom: 120px; left: 50%; width: 60px; height: 60px; font-size: 50px; display: flex; align-items: center; justify-content: center; transform: translateX(-50%); z-index: 50; }
        .invincible { animation: blink 0.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .obstacle, .item { position: absolute; font-size: 40px; z-index: 40; }

        .mobile-controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 100; }
        .key-btn { width: 75px; height: 75px; background: rgba(255,255,255,0.9); border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .content-box { background: white; padding: 30px; border-radius: 30px; width: 85%; max-width: 380px; text-align: center; }
        .btn-common { width: 100%; padding: 14px; border-radius: 50px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="start-screen" class="screen active">
        <div style="font-size: 6rem; margin-top: 150px;">🧹</div>
        <h1 style="color: var(--primary); font-size: 2.2rem;">비행술 수업</h1>
        <p>최대한 오래 하늘을 활공하세요!</p>
        <button class="btn-common" onclick="startGame()" style="background: var(--primary); color: white; width: 80%; margin-top: 50px;">비행 시작</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="header-container">
            <div id="life-display">❤️❤️</div>
            <div class="dist-container"><p id="distance">0</p><span class="unit">ALTITUDE (m)</span></div>
        </div>
        <div id="player">🧹</div>
        <div class="mobile-controls">
            <div class="key-btn" ontouchstart="keys.left=true" ontouchend="keys.left=false" onmousedown="keys.left=true" onmouseup="keys.left=false">←</div>
            <div class="key-btn" ontouchstart="keys.right=true" ontouchend="keys.right=false" onmousedown="keys.right=true" onmouseup="keys.right=false">→</div>
        </div>
    </div>

    <div id="gameover-screen" class="overlay">
        <div class="content-box">
            <div id="capture-area">
                <div style="border: 3px solid var(--primary); border-radius: 20px; padding: 20px; background: white;">
                    <h2 style="color: var(--danger); margin: 0;">추락!</h2>
                    <div id="final-dist" style="font-size: 3.5rem; font-weight: 900; color: var(--primary);">0m</div>
                    <div id="rank-text" style="font-weight: bold; color: #636e72;">낙제</div>
                </div>
            </div>
            <button class="btn-common" onclick="saveImage()" style="background: #00b894; color: white; margin-top: 15px;">📷 이미지로 저장하기</button>
            <button class="btn-common" onclick="location.reload()" style="background: var(--primary); color: white;">다시 도전</button>
        </div>
    </div>

    <script>
        let gameActive = false, altitude = 0, playerX = 50, playerVelocity = 0;
        let obstacles = [], items = [], lives = 2, isInvincible = false, isBoosting = false;
        let gameSpeed = 5;

        // 조작 방식 개선 (프레임별 체크)
        const keys = { left: false, right: false };

        window.addEventListener('keydown', (e) => { 
            if(e.key==='ArrowLeft') keys.left = true; 
            if(e.key==='ArrowRight') keys.right = true; 
        });
        window.addEventListener('keyup', (e) => { 
            if(e.key==='ArrowLeft') keys.left = false; 
            if(e.key==='ArrowRight') keys.right = false; 
        });

        function startGame() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            gameActive = true;
            loop();
        }

        function loop() {
            if (!gameActive) return;

            // 1. 부드러운 이동 로직 (가속도 적용)
            if (keys.left) playerVelocity -= 0.15;
            if (keys.right) playerVelocity += 0.15;
            
            playerVelocity *= 0.9; // 마찰력 (속도 감쇄)
            playerX += playerVelocity;

            // 벽 충돌 방지
            if (playerX < 8) { playerX = 8; playerVelocity = 0; }
            if (playerX > 92) { playerX = 92; playerVelocity = 0; }
            
            const playerEl = document.getElementById('player');
            playerEl.style.left = playerX + "%";
            // 기울기 효과 추가 (조작감 향상)
            playerEl.style.transform = `translateX(-50%) rotate(${playerVelocity * 5}deg)`;

            // 2. 고도 및 속도 로직
            if (isBoosting) {
                altitude += 2;
                gameSpeed = 15;
            } else {
                altitude += 0.2;
                gameSpeed = 5 + (altitude / 150);
            }
            document.getElementById('distance').innerText = Math.floor(altitude);

            // 3. 생성 로직 (빈도 유지)
            if (Math.random() < 0.05) spawnObstacle();
            if (Math.random() < 0.005) spawnItem();

            handleObjects();
            requestAnimationFrame(loop);
        }

        function spawnObstacle() {
            const obs = document.createElement('div');
            obs.className = 'obstacle';
            obs.innerText = ['☁️', '🦅', '⛈️', '🎈'][Math.floor(Math.random()*4)];
            obs.style.left = Math.random() * 90 + 5 + "%";
            obs.style.top = "-60px";
            document.getElementById('game-screen').appendChild(obs);
            obstacles.push({ el: obs, top: -60 });
        }

        function spawnItem() {
            const item = document.createElement('div');
            item.className = 'item item-glow';
            item.innerText = '⚡';
            item.style.left = Math.random() * 90 + 5 + "%";
            item.style.top = "-60px";
            item.style.fontSize = "40px"; 
            item.style.transform = "translateX(-50%)"; // 중앙 정렬 보정
            document.getElementById('game-screen').appendChild(item);
            items.push({ el: item, top: -60 });
        }

        function handleObjects() {
            const pRect = player.getBoundingClientRect();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.top += gameSpeed;
                o.el.style.top = o.top + "px";
                if (!isInvincible && !isBoosting) {
                    const oRect = o.el.getBoundingClientRect();
                    if (checkCollision(pRect, oRect)) hit();
                }
                if (o.top > window.innerHeight) { o.el.remove(); obstacles.splice(i, 1); }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.top += gameSpeed;
                it.el.style.top = it.top + "px";
                const iRect = it.el.getBoundingClientRect();
                if (checkCollision(pRect, iRect)) {
                    activateBoost();
                    it.el.remove();
                    items.splice(i, 1);
                } else if (it.top > window.innerHeight) {
                    it.el.remove();
                    items.splice(i, 1);
                }
            }
        }

        function checkCollision(r1, r2) {
            return !(r1.left > r2.right - 10 || r1.right < r2.left + 10 || r1.top > r2.bottom - 10 || r1.bottom < r2.top + 10);
        }

        function activateBoost() {
            if (isBoosting) return;
            isBoosting = true;
            const screen = document.getElementById('game-screen');
            const playerEl = document.getElementById('player');
            screen.classList.add('boost-active');
            playerEl.classList.add('boost-glow');
            let boostStartAltitude = altitude;
            const checkBoost = setInterval(() => {
                if (altitude >= boostStartAltitude + 50) {
                    clearInterval(checkBoost);
                    isBoosting = false;
                    screen.classList.remove('boost-active');
                    playerEl.classList.remove('boost-glow');
                    isInvincible = true;
                    playerEl.classList.add('invincible');
                    setTimeout(() => { isInvincible = false; playerEl.classList.remove('invincible'); }, 500); 
                }
            }, 50);
        }

        function hit() {
            lives--;
            updateLifeDisplay();
            if (lives <= 0) gameOver();
            else {
                isInvincible = true;
                player.classList.add('invincible');
                setTimeout(() => { isInvincible = false; player.classList.remove('invincible'); }, 1500);
            }
        }

        function updateLifeDisplay() {
            document.getElementById('life-display').innerText = '❤️'.repeat(lives) + '🖤'.repeat(2 - lives);
        }

        function gameOver() {
            gameActive = false;
            const score = Math.floor(altitude);
            document.getElementById('final-dist').innerText = score + "m";
            let rank = score >= 1200 ? "O(출중함)" : (score >= 800 ? "E(기대 이상)" : (score >= 600 ? "A(합격)" : "낙제"));
            document.getElementById('rank-text').innerText = rank;
            document.getElementById('gameover-screen').style.display = 'flex';
        }

        function saveImage() {
            html2canvas(document.getElementById('capture-area'), { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `비행기록_${Math.floor(altitude)}m.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
